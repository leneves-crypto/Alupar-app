        // --- 3. UTILITÁRIOS ---
        const compressImage = async (file, maxWidth, quality) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        };

        class PDFService {
          static async generatePMO(type, data, tag) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.width;
            const scheduleItem = BANCO_DE_DADOS_CRONOGRAMA.find(i => String(i.EQUIPE) === String(data.teamId));
            const leaderName = scheduleItem ? scheduleItem.LIDER : 'N/A';

            doc.setFillColor(0, 51, 102);
            doc.rect(10, 10, pageWidth - 20, 25, 'F');
            doc.setFontSize(16);
            doc.setTextColor(255, 255, 255);
            doc.text('ALUPAR - RELATÓRIO TÉCNICO', pageWidth / 2, 22, { align: 'center' });
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            const bodyData = [
                ['Equipamento:', tag],
                ['Tipo de PMO:', type],
                ['Executor / Líder:', leaderName],
                ['Data:', new Date(data.timestamp).toLocaleDateString()],
                ['Observações:', data.observations || 'Nenhuma']
            ];

            doc.autoTable({
                startY: 40,
                body: bodyData,
                theme: 'grid'
            });

            if (data.photoUrl) {
                doc.addPage();
                doc.text('EVIDÊNCIA FOTOGRÁFICA:', 14, 20);
                doc.addImage(data.photoUrl, 'JPEG', 14, 30, 180, 135);
            }

            doc.save(`PMO_${tag}_${type}.pdf`);
          }

          static async generateSafetyAlertReport(alert) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.width;
            
            doc.setFillColor(200, 0, 0); 
            doc.rect(10, 10, pageWidth - 20, 25, 'F');
            doc.setFontSize(16);
            doc.setTextColor(255, 255, 255);
            doc.text('ALUPAR - ALERTA DE SEGURANÇA', pageWidth / 2, 22, { align: 'center' });
            
            doc.setTextColor(0, 0, 0);
            doc.autoTable({
                startY: 40,
                body: [
                    ['Gravidade:', alert.severity],
                    ['Equipamento:', alert.equipmentTag || 'Geral'],
                    ['Relatado por:', alert.reporterName],
                    ['Data:', new Date(alert.timestamp).toLocaleString()],
                    ['Descrição:', alert.description]
                ],
                theme: 'grid'
            });

            if (alert.photo) {
                doc.addPage();
                doc.text('REGISTRO FOTOGRÁFICO:', 14, 20);
                doc.addImage(alert.photo, 'JPEG', 14, 30, 180, 135);
            }

            doc.save(`ALERTA_${alert.severity}_${alert.equipmentTag}.pdf`);
          }

        // --- 5. COMPONENTE APP ---
        function App() {

            const [completedReports, setCompletedReports] = useState([]);
            const [safetyAlerts, setSafetyAlerts] = useState([]);
            const [showSafetyForm, setShowSafetyForm] = useState(false);
            const [isAuditMode, setIsAuditMode] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('alupar_session');
                if (saved) setUser(JSON.parse(saved));
                
                db.collection('checklists').orderBy('timestamp', 'desc').onSnapshot(snap => {
                    setCompletedReports(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                
                db.collection('safety_alerts').orderBy('timestamp', 'desc').onSnapshot(snap => {
                    setSafetyAlerts(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                db.collection('tasks').onSnapshot(snap => {
                    const fireTasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setTasks(fireTasks);
                });
            }, []);

            useEffect(() => {
                localStorage.setItem('alupar_grounding', JSON.stringify(localGrounding));
            }, [localGrounding]);

            useEffect(() => {
                localStorage.setItem('alupar_liberacoes', JSON.stringify(liberacoes));
            }, [liberacoes]);

            const handleLogin = (e) => {
                if (e) e.preventDefault();
                if (pin === selectedProfile.pin) {

                    setUser(data);
                    localStorage.setItem('alupar_session', JSON.stringify(data));
                } else {
                    setError('PIN INVÁLIDO');
                }
            };

            const toggleGrounding = (tower) => {
              const newState = { ...localGrounding, [tower]: !localGrounding[tower] };

            };

              const newState = { ...liberacoes, [teamNum]: true };
              setLiberacoes(newState);

            };

                PDFService.generatePMO(showChecklist, data, selectedTask.TAG);
                setShowChecklist(null);
                setIsAuditMode(false);
                return;
              }
              const reportId = `${selectedTask.TAG}_${user.teamNumber}_${Date.now()}`;

                taskId: selectedTask.TAG,
                teamId: user.teamNumber,
                pmoType: showChecklist,
                tag: selectedTask.TAG,
                ...data
              });
              PDFService.generatePMO(showChecklist, data, selectedTask.TAG);
              setShowChecklist(null);
              setSelectedTask(null);
            };

            const submitSafetyAlert = async (e) => {
              e.preventDefault();

                        </form>
                      )}
                    </div>
                  </div>
                </div>
              );
            }

            const isTeam = user.role === 'team';
            const isEng = ['admin', 'engineer', 'coordinator'].includes(user.role);

            return (
              <div className="h-screen flex flex-col bg-slate-50 overflow-hidden">
                <header className="bg-white border-b p-6 flex justify-between items-center z-50">
                  <div className="flex items-center gap-4">
                    <div className="w-10 h-10 bg-alupar-dark rounded-xl flex items-center justify-center text-white font-black italic">A</div>
                    <div>
                      <p className="text-[10px] font-black text-alupar-blue uppercase tracking-widest leading-none mb-1">Olá, {user.name}</p>
                      <p className="text-xs font-black text-zinc-800">Unidade SE-RNS</p>
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <div className="hidden md:flex flex-col items-right text-right">
                      <p className="text-[9px] font-black text-zinc-400 uppercase">20 de Abril de 2026</p>
                      <p className="text-[10px] font-bold text-safety-green">STATUS: OPERACIONAL</p>
                    </div>
                    <button onClick={() => { localStorage.removeItem('alupar_session'); setUser(null); }} className="p-3 bg-red-50 text-red-500 rounded-xl"><LucideIcon name="power" size={18} /></button>
                  </div>
                </header>

                <div className="flex flex-1 overflow-hidden">
                  <aside className="w-64 bg-alupar-dark text-white p-6 flex flex-col gap-2 shrink-0 border-r border-black/20">
                     <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-4 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'dashboard' ? 'bg-alupar-blue' : 'opacity-60 hover:opacity-100'}`}><LucideIcon name="layout" size={18} /> Dashboard</button>
                     
                     {isTeam && (
                        <>
                          <button onClick={() => setActiveTab('seguranca')} className={`w-full flex items-center gap-4 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'seguranca' ? 'bg-alupar-blue' : 'opacity-60 hover:opacity-100'}`}><LucideIcon name="zap" size={18} /> Segurança</button>
                          <button onClick={() => setActiveTab('execucao')} className={`w-full flex items-center gap-4 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'execucao' ? 'bg-alupar-blue' : 'opacity-60 hover:opacity-100'}`}><LucideIcon name="wrench" size={18} /> Execução</button>
                        </>
                     )}

                     {isEng && (
                        <>
                          <button onClick={() => setActiveTab('liberacao')} className={`w-full flex items-center gap-4 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'liberacao' ? 'bg-alupar-blue' : 'opacity-60 hover:opacity-100'}`}><LucideIcon name="shield" size={18} /> Liberação</button>
                          <button onClick={() => setActiveTab('relatorios')} className={`w-full flex items-center gap-4 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'relatorios' ? 'bg-alupar-blue' : 'opacity-60 hover:opacity-100'}`}><LucideIcon name="file-text" size={18} /> Relatórios</button>
                        </>
                     )}
                     
                     <button onClick={() => setActiveTab('riscos')} className={`w-full flex items-center gap-4 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest ${activeTab === 'riscos' ? 'bg-alupar-blue' : 'opacity-60 hover:opacity-100'}`}><LucideIcon name="alert-triangle" size={18} /> Riscos</button>
                  </aside>

                  <main className="flex-1 overflow-y-auto p-10 space-y-10 custom-scrollbar">
                     
                     {/* TAB: DASHBOARD */}
                     {activeTab === 'dashboard' && (
                        <div className="space-y-10">
                           <section className="bg-alupar-blue rounded-[50px] p-10 text-white shadow-2xl relative overflow-hidden">
                              <h1 className="text-4xl font-black italic mb-2 tracking-tighter">Centro de Controle Sudeste</h1>
                              <p className="opacity-70 text-sm font-bold">Monitoramento em Tempo Real - SE RIO NOVO</p>
                              <div className="flex gap-4 mt-8 flex-wrap">
                                 <div className="bg-white/10 p-4 rounded-3xl flex-1 min-w-[150px] border border-white/10">
                                    <p className="text-[9px] font-black uppercase opacity-60">Pessoas em Campo</p>
                                    <p className="text-2xl font-black">24</p>
                                 </div>
                                 <div className="bg-white/10 p-4 rounded-3xl flex-1 min-w-[150px] border border-white/10">
                                    <p className="text-[9px] font-black uppercase opacity-60">Atividades do Dia</p>
                                    <p className="text-2xl font-black">{BANCO_DE_DADOS_CRONOGRAMA.length}</p>
                                 </div>
                                 <div className="bg-white/10 p-4 rounded-3xl flex-1 min-w-[150px] border border-white/10">
                                    <p className="text-[9px] font-black uppercase opacity-60">Alertas Ativos</p>
                                    <p className="text-2xl font-black text-safety-yellow">{safetyAlerts.filter(a=>a.status==='pending').length}</p>
                                 </div>
                              </div>
                           </section>
                           
                           <section className="space-y-6">
                              <h2 className="text-xl font-black text-alupar-dark uppercase tracking-widest">Cronograma Técnico</h2>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                 {BANCO_DE_DADOS_CRONOGRAMA.slice(0, 10).map((item, i) => (
                                    <div key={i} className="hd-card flex justify-between items-center group hover:border-alupar-blue transition-all">
                                       <div>
                                          <p className="text-[9px] font-black text-alupar-blue mb-1 uppercase bg-alupar-light px-2 py-0.5 rounded inline-block">{item["TIPO PMO"]}</p>
                                          <h3 className="font-black text-zinc-800 text-sm italic">{item.TAG}</h3>
                                          <p className="text-[10px] font-bold text-zinc-400">{item["DESCRIÇÃO TECNICA"]}</p>
                                       </div>
                                       <div className="text-right">
                                          <p className="text-[9px] font-black text-zinc-400 uppercase">Equipe {item.EQUIPE}</p>
                                          <p className="text-[8px] font-bold text-zinc-300">Responsável: {item.LIDER}</p>
                                       </div>
                                    </div>
                                 ))}
                                 <p className="col-span-full text-center text-[10px] font-black text-zinc-300 uppercase italic">Exibindo primeiras 10 atividades. Para ver todas, acesse o painel de Auditoria.</p>
                              </div>
                           </section>
                        </div>
                     )}

                     {/* TAB: SEGURANÇA */}
                     {activeTab === 'seguranca' && (
                        <div className="space-y-6 animate-slide-up">
                           <div className="bg-white p-8 rounded-[40px] shadow-xl border border-blue-50">
                              <div className="flex items-center justify-between mb-8 border-b pb-6">
                                 <div>
                                    <h2 className="text-2xl font-black text-alupar-dark italic tracking-tighter">CONTROLE DE ATERRAMENTO</h2>
                                    <p className="text-[10px] uppercase font-bold text-zinc-400">Equipe {user.teamNumber} | Confirmação de Segurança</p>
                                 </div>
                                 <LucideIcon name="zap" className="text-safety-yellow" size={40} />
                              </div>
                              <div className="grid grid-cols-2 lg:grid-cols-3 gap-6">
                                 {(GROUNDING_LISTS[user.teamNumber] || []).map(tower => (
                                    <button 
                                       key={tower}
                                       onClick={() => toggleGrounding(tower)}
                                       className={`p-6 rounded-[30px] border-2 flex items-center justify-between transition-all ${localGrounding[tower] ? 'border-safety-green bg-safety-green/5 text-safety-green' : 'border-gray-100 bg-gray-50 text-zinc-300 grayscale'}`}
                                    >
                                       <span className="font-black italic text-sm">{tower}</span>
                                       <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center ${localGrounding[tower] ? 'bg-safety-green border-safety-green text-white shadow-xl shadow-safety-green/20' : 'border-gray-200'}`}>
                                          {localGrounding[tower] && <LucideIcon name="check" size={16} />}
                                       </div>
                                    </button>
                                 ))}
                              </div>
                              <div className="mt-10 p-6 bg-gray-50 rounded-3xl border border-gray-100">
                                 <p className="text-[10px] font-black text-zinc-400 uppercase mb-2">Instrução Técnica</p>
                                 <p className="text-xs text-zinc-500 leading-relaxed font-medium">Após instalar todos os conjuntos de aterramento temporário, selecione os pontos acima para liberar a execução. Os dados serão sincronizados com o Centro de Operação Regional.</p>
                              </div>
                           </div>
                        </div>
                     )}

                     {/* TAB: EXECUÇÃO */}
                     {activeTab === 'execucao' && (
                        <div className="space-y-6 animate-slide-up">
                           <h2 className="text-2xl font-black text-alupar-dark italic uppercase tracking-tighter">Atividades em Campo</h2>
                           <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                              {BANCO_DE_DADOS_CRONOGRAMA.filter(i => String(i.EQUIPE) === String(user.teamNumber)).map((item, i) => {
                                 const isReleased = liberacoes[user.teamNumber] === true;
                                 const groundingPoints = GROUNDING_LISTS[user.teamNumber] || [];
                                 const isGrounded = groundingPoints.length === 0 || groundingPoints.every(t => localGrounding[t]);
                                 const canOpen = isReleased && isGrounded;

                                 return (
                                    <button 
                                       key={i}
                                       disabled={!canOpen}
                                       onClick={() => { setSelectedTask(item); setShowChecklist(item["DESCRIÇÃO TECNICA"]); }}
                                       className={`hd-card h-[200px] flex flex-col justify-between text-left transition-all ${canOpen ? 'hover:shadow-2xl hover:border-alupar-blue' : 'opacity-40 grayscale cursor-not-allowed bg-gray-100'}`}
                                    >
                                       <div>
                                          <div className="flex justify-between items-start mb-4">
                                             <LucideIcon name="file-text" className={canOpen ? "text-alupar-blue" : "text-zinc-400"} />
                                             {canOpen ? <div className="text-safety-green font-black text-[9px] uppercase border border-safety-green/30 px-2 py-0.5 rounded">LIBERADO</div> : <div className="text-red-500 font-black text-[9px] uppercase border border-red-500/30 px-2 py-0.5 rounded">BLOQUEADO</div>}
                                          </div>
                                          <h3 className="font-black text-xl italic text-alupar-dark">{item.TAG}</h3>
                                          <p className="text-[11px] font-bold text-zinc-500 uppercase">{item["DESCRIÇÃO TECNICA"]} • {item["TIPO PMO"]}</p>
                                       </div>
                                       {!canOpen && <p className="text-[8px] font-black text-red-500 uppercase italic">Aguardando Segurança/Engenharia</p>}
                                       {canOpen && <span className="text-[10px] font-black text-alupar-blue uppercase flex items-center gap-2">Iniciar Execução <LucideIcon name="chevron-right" size={14} /></span>}
                                    </button>
                                 );
                              })}
                           </div>
                        </div>
                     )}

                     {/* TAB: LIBERAÇÃO */}
                     {activeTab === 'liberacao' && (
                        <div className="space-y-10 animate-slide-up">
                           <div className="hd-card bg-alupar-dark text-white border-0 shadow-2xl p-10 rounded-[50px]">
                              <h2 className="text-3xl font-black italic mb-6 tracking-tighter">CENTRO DE LIBERAÇÃO (ENGENHARIA)</h2>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                 {[1, 2, 3, 4, 5].map(num => {
                                    const isGrounded = (GROUNDING_LISTS[num] || []).every(t => localGrounding[t]);
                                    const isReleased = liberacoes[num] === true;
                                    return (
                                       <div key={num} className="bg-white/5 border border-white/10 p-6 rounded-[30px] flex items-center justify-between group hover:bg-white/10 transition-all">
                                          <div>
                                             <h4 className="font-black text-sm uppercase">Equipe {num}</h4>
                                             <div className="flex gap-4 mt-2">
                                                <div className="flex items-center gap-1">
                                                   <div className={`w-2 h-2 rounded-full ${isGrounded ? 'bg-safety-green shadow-[0_0_8px_green]' : 'bg-red-500'}`} />
                                                   <span className={`text-[8px] font-black ${isGrounded ? 'text-safety-green' : 'text-red-500'}`}>SEGURANÇA</span>
                                                </div>
                                                <div className="flex items-center gap-1">
                                                   <div className={`w-2 h-2 rounded-full ${isReleased ? 'bg-alupar-blue shadow-[0_0_8px_blue]' : 'bg-gray-500'}`} />
                                                   <span className={`text-[8px] font-black ${isReleased ? 'text-alupar-blue' : 'text-gray-500'}`}>AUTORIZAÇÃO</span>
                                                </div>
                                             </div>
                                          </div>
                                          <button 
                                             disabled={!isGrounded || isReleased}
                                             onClick={() => handleLiberação(num)}
                                             className={`px-6 py-3 rounded-2xl text-[9px] font-black uppercase transition-all ${isReleased ? 'bg-safety-green text-white' : isGrounded ? 'bg-alupar-blue text-white hover:scale-105' : 'bg-white/10 text-white/30 cursor-not-allowed'}`}
                                          >
                                             {isReleased ? "CONCLUÍDO" : "AUTORIZAR"}
                                          </button>
                                       </div>
                                    );
                                 })}
                              </div>
                           </div>

                           <section className="space-y-6">
                              <h3 className="text-xl font-black text-alupar-dark italic uppercase">Auditoria Geral (Modo Visualização)</h3>
                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                 {BANCO_DE_DADOS_CRONOGRAMA.map((item, idx) => (
                                    <div key={idx} className="hd-card flex items-center justify-between">
                                       <div>
                                          <p className="text-[8px] font-black text-zinc-400">Atividade ID {idx+1000}</p>
                                          <h4 className="font-black text-alupar-dark text-sm">{item.TAG}</h4>
                                          <p className="text-[10px] font-bold text-zinc-400 uppercase italic">{item["DESCRIÇÃO TECNICA"]}</p>
                                       </div>
                                       <button onClick={() => { setSelectedTask(item); setShowChecklist(item["DESCRIÇÃO TECNICA"]); setIsAuditMode(true); }} className="bg-alupar-light text-alupar-blue text-[8px] font-black px-4 py-2 rounded-xl hover:bg-alupar-blue hover:text-white transition-all uppercase">Simular Relatório</button>
                                    </div>
                                 ))}
                              </div>
                           </section>
                        </div>
                     )}

                     {/* TAB: RELATÓRIOS */}
                     {activeTab === 'relatorios' && (
                        <div className="space-y-6 animate-slide-up">
                           <div className="flex justify-between items-center bg-white p-8 rounded-[40px] shadow-sm border border-gray-100 mb-10">
                              <h2 className="text-2xl font-black italic tracking-tighter text-alupar-dark">CENTRAL DE RELATÓRIOS TÉCNICOS</h2>
                              <p className="text-[10px] font-black text-zinc-400 uppercase bg-gray-100 px-4 py-2 rounded-2xl">Total: {completedReports.length}</p>
                           </div>
                           <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                              {completedReports.map((r, i) => (
                                 <div key={i} className="hd-card flex items-center justify-between hover:shadow-2xl transition-all">
                                    <div className="flex items-center gap-4">
                                       <div className="w-12 h-12 bg-alupar-light rounded-2xl flex items-center justify-center text-alupar-blue"><LucideIcon name="file-text" /></div>
                                       <div>
                                          <h4 className="font-black text-zinc-800 text-sm uppercase">{r.pmoType} • {r.tag}</h4>
                                          <p className="text-[9px] font-bold text-zinc-400">Equipe {r.teamId} | {new Date(r.timestamp).toLocaleString()}</p>
                                       </div>
                                    </div>
                                    <button onClick={() => PDFService.generatePMO(r.pmoType, r, r.tag)} className="bg-alupar-blue text-white p-3 rounded-xl hover:bg-alupar-dark transition-all"><LucideIcon name="download" size={16} /></button>
                                 </div>
                              ))}
                           </div>
                        </div>
                     )}

                     {/* TAB: RISCOS */}
                     {activeTab === 'riscos' && (
                        <div className="space-y-10 animate-slide-up">
                           <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                              <div className="hd-card border-t-8 border-safety-red p-10">
                                 <LucideIcon name="alert-triangle" size={48} className="text-safety-yellow mb-6" />
                                 <h2 className="text-2xl font-black italic text-alupar-dark mb-4">Reportar Anormalidade</h2>
                                 <p className="text-xs text-zinc-500 font-medium mb-8 leading-relaxed">Identificou uma situação de risco, falta de EPI, ou falha de isolamento? Reporte imediatamente para a supervisão TST e Engenharia.</p>
                                 <button onClick={() => setShowSafetyForm(true)} className="w-full py-5 bg-safety-red text-white rounded-3xl font-black uppercase tracking-widest hover:bg-alupar-dark shadow-xl shadow-safety-red/20 transition-all">Abrir Canal de Segurança</button>
                                 <div className="mt-8 flex items-center gap-2 text-[10px] font-black text-zinc-400 uppercase italic">
                                    <LucideIcon name="shield-check" size={14} className="text-safety-green" />
                                    Direito de Recusa Garantido
                                 </div>
                              </div>
                              <div className="hd-card p-10 flex flex-col">
                                 <h3 className="text-xl font-black italic text-alupar-dark mb-6 border-b pb-4">Ocorrências Recentes</h3>
                                 <div className="flex-1 space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {safetyAlerts.map((a, i) => (
                                       <div key={i} className="p-4 bg-gray-50 rounded-2xl border flex items-center justify-between group">
                                          <div className="flex items-center gap-3">
                                             <div className={`w-2 h-2 rounded-full ${a.severity === 'Crítica' ? 'bg-red-600 shadow-[0_0_8px_red]' : 'bg-safety-yellow'}`} />
                                             <div>
                                                <p className="text-[10px] font-black text-alupar-dark">{a.severity.toUpperCase()} • {a.equipmentTag}</p>
                                                <p className="text-[9px] font-bold text-zinc-400 italic">Relator: {a.reporterName}</p>
                                             </div>
                                          </div>
                                          <button onClick={() => PDFService.generateSafetyAlertReport(a)} className="text-zinc-300 group-hover:text-alupar-dark transition-all"><LucideIcon name="external-link" size={16} /></button>
                                       </div>
                                    ))}
                                    {safetyAlerts.length === 0 && <p className="text-center text-xs font-bold text-zinc-300 py-10 uppercase italic">Nenhuma anormalidade registrada.</p>}
                                 </div>
                              </div>
                           </div>
                        </div>
                     )}
                  </main>
                </div>

                {/* MODAL: CHECKLIST */}
                {showChecklist && (
                  <ChecklistForm 
                     type={showChecklist} 
                     taskId={selectedTask.TAG} 
                     onSubmit={submitChecklist} 
                     onCancel={() => { setShowChecklist(null); setIsAuditMode(false); }} 
                  />
                )}

                {/* MODAL: SEGURANÇA (SAFETY FORM) */}
                {showSafetyForm && (
                  <div className="fixed inset-0 bg-alupar-dark/95 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                     <div className="bg-white max-w-xl w-full rounded-[40px] shadow-2xl overflow-hidden border-t-[10px] border-safety-red animate-slide-up">
                        <div className="p-10">
                           <div className="flex justify-between items-start mb-8">
                              <div>
                                 <h2 className="text-2xl font-black italic text-alupar-dark tracking-tighter">Relatório de Anormalidade</h2>
                                 <p className="text-[10px] font-bold uppercase text-zinc-400 mt-1">Segurança do Trabalho & Manutenção</p>
                              </div>
                              <button onClick={() => setShowSafetyForm(false)} className="text-zinc-300 hover:text-safety-red transition-all p-2"><LucideIcon name="x" size={32} /></button>
                           </div>
                           <form onSubmit={submitSafetyAlert} className="space-y-6">
                              <div className="grid grid-cols-2 gap-4">
                                 {['Baixa', 'Média', 'Alta', 'Crítica'].map(level => (
                                    <label key={level} className="relative cursor-pointer">
                                       <input type="radio" name="severity" value={level} required className="peer sr-only" />
                                       <div className="p-3 text-center text-[10px] font-black rounded-2xl border-2 border-gray-100 peer-checked:bg-safety-red peer-checked:text-white peer-checked:border-safety-red transition-all uppercase">{level}</div>
                                    </label>
                                 ))}
                              </div>
                              <input name="tag" type="text" placeholder="Tag do Equipamento (Ex: DJ-03)" className="w-full p-5 bg-gray-50 border rounded-2xl text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-alupar-blue" required />
                              <textarea name="description" placeholder="Descreva os detalhes da anormalidade..." rows="4" className="w-full p-5 bg-gray-50 border rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-alupar-blue" required />
                              <div className="p-4 bg-red-50 rounded-2xl border border-red-100 flex items-center gap-4">
                                 <LucideIcon name="info" className="text-safety-red shrink-0" />
                                 <p className="text-[9px] font-bold text-red-500 uppercase leading-relaxed">Este reporte enviará um alerta visual em tempo real para todos os coordenadores e engenheiros conectados ao sistema.</p>
                              </div>
                              <div className="flex gap-4">
                                 <button type="button" onClick={() => setShowSafetyForm(false)} className="flex-1 py-5 font-black text-zinc-400 uppercase text-[10px]">Cancelar</button>
                                 <button type="submit" className="flex-1 py-5 bg-safety-red text-white rounded-3xl font-black uppercase text-[10px] shadow-xl shadow-safety-red/20 shadow-xl">Enviar Reporte</button>
                              </div>
                           </form>
                        </div>
                     </div>
                  </div>
                )}
              </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
